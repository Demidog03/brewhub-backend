services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: brewhub
      POSTGRES_PASSWORD: brewhub
      POSTGRES_DB: brewhub
    ports:
      # Host 5434 to avoid clashing with a local Postgres already on 5432.
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brewhub -d brewhub']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      # Talks to the db service over the compose network, not the host port.
      DATABASE_URL: postgres://brewhub:brewhub@db:5432/brewhub
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'
    # Apply migrations, then start the server.
    command: sh -c "pnpm db:migrate && pnpm start"

volumes:
  pgdata:
